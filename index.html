<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audit SEO - École Gustave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg: #0a0e17; --bg2: #111827; --bg3: #1a2236; --card: #1e293b; --border: #2d3a50; --text: #e2e8f0; --text2: #94a3b8; --accent: #3b82f6; --accent2: #60a5fa; --green: #22c55e; --yellow: #eab308; --orange: #f97316; --red: #ef4444; --pink: #ec4899; --font: 'Inter',-apple-system,sans-serif; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
.container { max-width:1200px; margin:0 auto; padding:0 20px; }
a { color:var(--accent); text-decoration:none; }
a:hover { color:var(--accent2); }

/* HEADER */
header { background:var(--bg2); border-bottom:1px solid var(--border); padding:16px 0; position:sticky; top:0; z-index:100; }
.header-inner { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.logo { font-size:20px; font-weight:700; color:#fff; display:flex; align-items:center; gap:8px; }
.logo span { color:var(--accent); }
.score-badge { display:inline-flex; align-items:center; gap:6px; background:var(--bg3); padding:8px 16px; border-radius:100px; font-size:14px; font-weight:600; }
.score-badge .num { font-size:22px; }
.score-badge .num.critique { color:var(--red); }
.score-badge .num.moyen { color:var(--orange); }
.score-badge .num.bon { color:var(--green); }

/* NAV */
nav { background:var(--bg2); border-bottom:1px solid var(--border); overflow-x:auto; }
.nav-inner { display:flex; gap:0; }
.nav-link { padding:14px 20px; font-size:13px; font-weight:500; color:var(--text2); text-decoration:none; white-space:nowrap; border-bottom:2px solid transparent; transition:all .2s; cursor:pointer; }
.nav-link:hover { color:#fff; background:var(--bg3); }
.nav-link.active { color:var(--accent); border-bottom-color:var(--accent); background:var(--bg3); }

.page { display:none; padding:32px 0 60px; }
.page.active { display:block; }
h1 { font-size:28px; font-weight:700; margin-bottom:6px; }
.subtitle { color:var(--text2); font-size:15px; margin-bottom:24px; }
h2 { font-size:22px; font-weight:600; margin:32px 0 16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
h3 { font-size:17px; font-weight:600; margin:20px 0 10px; }
h4 { font-size:14px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin:16px 0 8px; }
.grid { display:grid; gap:16px; }
.grid-2 { grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); }
.grid-3 { grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); }
.grid-4 { grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.card-title { font-size:15px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.card-text { color:var(--text2); font-size:13px; line-height:1.5; }
.tag { display:inline-block; padding:3px 10px; border-radius:100px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.tag-critique { background:rgba(239,68,68,0.15); color:var(--red); }
.tag-haute { background:rgba(249,115,22,0.15); color:var(--orange); }
.tag-moyenne { background:rgba(234,179,8,0.15); color:var(--yellow); }
.tag-basse { background:rgba(59,130,246,0.15); color:var(--accent); }
.tag-ok { background:rgba(34,197,94,0.15); color:var(--green); }
.metric { text-align:center; padding:16px; }
.metric-value { font-size:32px; font-weight:800; }
.metric-value.ok { color:var(--green); }
.metric-value.echec { color:var(--red); }
.metric-value.warn { color:var(--orange); }
.metric-label { font-size:12px; color:var(--text2); margin-top:4px; }
.metric-sub { font-size:11px; color:var(--text2); margin-top:2px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; background:var(--bg3); color:var(--text2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
td { padding:10px 12px; border-bottom:1px solid var(--border); }
tr:hover td { background:rgba(59,130,246,0.03); }
.badge-list { display:flex; flex-wrap:wrap; gap:8px; }
.badge { background:var(--bg3); padding:6px 14px; border-radius:100px; font-size:12px; color:var(--text2); border:1px solid var(--border); }
.issue { border-left:3px solid; padding:16px 20px; margin-bottom:12px; background:var(--card); border-radius:0 8px 8px 0; }
.issue-critique { border-left-color:var(--red); }
.issue-haute { border-left-color:var(--orange); }
.issue-moyenne { border-left-color:var(--yellow); }
.issue-basse { border-left-color:var(--accent); }
.issue-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:6px; flex-wrap:wrap; }
.issue-title { font-size:14px; font-weight:600; }
.issue-desc { color:var(--text2); font-size:13px; margin-bottom:6px; }
.issue-solution { font-size:12px; color:var(--accent2); font-style:italic; }
.issue-impact { font-size:12px; color:var(--pink); }
.positive { display:flex; align-items:flex-start; gap:8px; padding:8px 0; }
.positive::before { content:"✓"; color:var(--green); font-weight:700; flex-shrink:0; }
.progress-bar { height:8px; background:var(--bg3); border-radius:100px; overflow:hidden; margin:8px 0; }
.progress-fill { height:100%; border-radius:100px; transition:width 1s; }
.progress-fill.critique { background:linear-gradient(90deg,var(--red),var(--orange)); }
.progress-fill.moyen { background:linear-gradient(90deg,var(--orange),var(--yellow)); }
.progress-fill.bon { background:linear-gradient(90deg,var(--green),var(--accent)); }
.score-ring { width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto; position:relative; }
.score-ring-inner { text-align:center; }
.score-ring-num { font-size:36px; font-weight:800; display:block; }
.score-ring-label { font-size:11px; color:var(--text2); }
.count { font-size:13px; color:var(--text2); background:var(--bg3); padding:2px 10px; border-radius:100px; }
@media (max-width:768px) {
  .header-inner { flex-direction:column; text-align:center; }
  .nav-link { padding:12px 14px; font-size:12px; }
  h1 { font-size:22px; }
  .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; }
  .metric-value { font-size:24px; }
  .score-ring { width:100px; height:100px; }
  .score-ring-num { font-size:28px; }
}
</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="#" class="logo" onclick="showPage('overview')">Audit <span>SEO</span></a>
    <div class="score-badge">
      Score global
      <span class="num critique" id="globalScore">--</span>
      <span style="font-size:12px;color:var(--text2)">/100</span>
    </div>
  </div>
</header>

<nav>
  <div class="container nav-inner" id="mainNav">
    <a href="#" class="nav-link active" data-page="overview">Vue d'ensemble</a>
    <a href="#" class="nav-link" data-page="performance">Performance</a>
    <a href="#" class="nav-link" data-page="seo-technique">SEO Technique</a>
    <a href="#" class="nav-link" data-page="contenu">Contenu</a>
    <a href="#" class="nav-link" data-page="securite">Sécurité</a>
    <a href="#" class="nav-link" data-page="concurrence">Concurrence</a>
    <a href="#" class="nav-link" data-page="plan">Plan d'action</a>
  </div>
</nav>

<main class="container" id="app">
  <div style="text-align:center;padding:60px 20px;color:var(--text2)">
    <div style="font-size:40px;margin-bottom:16px">⏳</div>
    <div>Chargement des données...</div>
  </div>
</main>

<script>
let data = null;

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const el = document.getElementById('page-' + pageId);
  if (el) el.classList.add('active');
  const link = document.querySelector(`.nav-link[data-page="${pageId}"]`);
  if (link) link.classList.add('active');
  window.location.hash = pageId;
}

function initNavigation() {
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      showPage(link.dataset.page);
    });
  });
  if (window.location.hash) {
    const page = window.location.hash.slice(1) || 'overview';
    showPage(page);
  }
}

// Progress bar color
function pbar(val) {
  if (val >= 80) return 'bon';
  if (val >= 50) return 'moyen';
  return 'critique';
}

// Score ring
function scoreRing(val, label, size) {
  const s = size || 120;
  const pct = Math.min(val, 100);
  const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  const bg = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  return `<div class="score-ring" style="width:${s}px;height:${s}px;background:conic-gradient(${bg} 0% ${pct}%, var(--bg3) ${pct}% 100%)">
    <div class="score-ring-inner"><span class="score-ring-num" style="color:${color};font-size:${s*0.3}px">${val}</span><span class="score-ring-label">${label}</span></div>
  </div>`;
}

function render() {
  if (!data) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--red)">❌ Erreur de chargement des données</div>';
    return;
  }
  
  const d = data;
  const score = d.meta?.score_global_nouveau || '--';
  document.getElementById('globalScore').textContent = score;
  
  // Build all pages
  const pages = `
    ${renderOverview(d)}
    ${renderPerformance(d)}
    ${renderSEOTechnique(d)}
    ${renderContenu(d)}
    ${renderSecurite(d)}
    ${renderConcurrence(d)}
    ${renderPlan(d)}
  `;
  
  document.getElementById('app').innerHTML = pages;
  initNavigation();
}

// ======================== OVERVIEW ========================
function renderOverview(d) {
  const score = d.meta?.score_global_nouveau || 0;
  const perf = d.performances || {};
  const cwv = perf.core_web_vitals_reels || {};
  const crit = d.problemes_critiques || [];
  const positifs = d.points_positifs || [];
  const sec = d.securite || {};
  const cont = d.contenu || {};
  
  return `<div class="page active" id="page-overview">
    <h1>Audit SEO — École Gustave</h1>
    <p class="subtitle">Analyse complète multidimensionnelle — Performances, SEO technique, Contenu, Sécurité, Concurrence, Backlinks, Social Media — ${d.meta?.date || '16 juin 2026'}</p>
    
    <div class="grid grid-3" style="margin-bottom:24px">
      <div class="card" style="text-align:center">
        ${scoreRing(score, '/100 global')}
      </div>
      <div class="card">
        <h4 style="margin-top:0">Scores PageSpeed (moyenne)</h4>
        <div style="margin:8px 0">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>Mobile moyen</span><span style="font-weight:600;color:var(--orange)">${perf.score_mobile_moyen||'?'}/100</span>
          </div>
          <div class="progress-bar"><div class="progress-fill ${pbar(perf.score_mobile_moyen)}" style="width:${perf.score_mobile_moyen||0}%"></div></div>
        </div>
        <div style="margin:8px 0">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>Desktop moyen</span><span style="font-weight:600;color:var(--yellow)">${perf.score_desktop_moyen||'?'}/100</span>
          </div>
          <div class="progress-bar"><div class="progress-fill ${pbar(perf.score_desktop_moyen)}" style="width:${perf.score_desktop_moyen||0}%"></div></div>
        </div>
      </div>
      <div class="card">
        <h4 style="margin-top:0">Core Web Vitals (réel)</h4>
        <div class="grid grid-2" style="gap:8px;margin-top:8px">
          ${[
            ['LCP', cwv.lcp_p75||'?', cwv.lcp_seuil||'2.5s', cwv.lcp_p75 && cwv.lcp_p75.replace('ms','') <= (cwv.lcp_seuil||'2500').replace('ms','') ? 'ok' : (cwv.lcp_p75 ? 'echec' : 'warn')],
            ['TTFB', cwv.ttfb_p75||'?', cwv.ttfb_seuil||'800ms', cwv.ttfb_p75 && cwv.ttfb_p75.replace('ms','') <= (cwv.ttfb_seuil||'800').replace('ms','') ? 'ok' : 'echec'],
            ['CLS', cwv.cls_p75||'?', cwv.cls_seuil||'0.1', 'ok'],
            ['INP', cwv.inp_p75||'?', cwv.inp_seuil||'200ms', 'ok'],
          ].map(m => `<div class="metric" style="padding:8px;background:var(--bg3);border-radius:8px">
            <div class="metric-value ${m[3]}" style="font-size:24px">${m[1]}</div>
            <div class="metric-label">${m[0]}</div>
            <div class="metric-sub">Seuil: ${m[2]}</div>
          </div>`).join('')}
        </div>
        ${cwv.ttfb_p75 && parseInt(cwv.ttfb_p75)>800 ? `<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;border:1px solid rgba(239,68,68,0.2)">
          <div style="font-size:13px;font-weight:600;color:var(--red)">TTFB : ${cwv.ttfb_p75} (réel) — ÉCHEC</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">Le seuil recommandé est &lt; ${cwv.ttfb_seuil}.</div>
        </div>` : ''}
      </div>
    </div>

    <h2>Problèmes critiques <span class="count">${crit.length}</span></h2>
    ${crit.map(c => `<div class="issue issue-critique">
      <div class="issue-header">
        <div class="issue-title">${c.titre||'?'}</div>
      </div>
      <div class="issue-desc">${c.impact||''}</div>
      <div class="issue-solution">${c.solution_rapide||c.solution||''}</div>
    </div>`).join('')}
    
    <h2>Points positifs</h2>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">✅ Forces identifiées</div>
        ${(positifs||[]).slice(0,8).map(p => `<div class="positive">${p}</div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">📊 Chiffres clés</div>
        <table style="margin-top:8px">
          ${[
            ['Pages crawlées', '169 (0 erreur HTTP)'],
            ['Sans meta description', `${cont.meta_descriptions?.pages_sans_meta||95} (${cont.meta_descriptions?.pourcentage||'56%'})`],
            ['Moyenne mots/page', `${cont.statistiques?.moyenne_mots||'?'} mots`],
            ['Score sécurité', sec.score_securityheaders||'D'],
            ['LinkedIn', '4 333 abonnés'],
            ['Articles presse', '6 (Figaro, Le Monde, BFMTV...)'],
            ['DR estimé', d.backlinks_et_offpage?.domain_rating_estime||'10-25'],
            ['Plan d\'action', `${(d.plan_action_priorise?.phase_1_urgence_7_jours?.length||0)+(d.plan_action_priorise?.phase_2_court_terme_30_jours?.length||0)+(d.plan_action_priorise?.phase_3_moyen_terme_90_jours?.length||0)+(d.plan_action_priorise?.phase_4_long_terme_6_mois?.length||0)} actions`],
          ].map(r => `<tr><td style="padding:6px 8px;color:var(--text2)">${r[0]}</td><td style="padding:6px 8px;font-weight:600">${r[1]}</td></tr>`).join('')}
        </table>
      </div>
    </div>
    
    <h2>Méthodologie</h2>
    <div class="card">
      <div class="badge-list">
        ${(d.meta?.outils||['PageSpeed (Lighthouse 13.3)','CrUX API','Analyse HTML brute','Analyse sitemaps','Analyse sécurité headers','Analyse DNS','Analyse concurrentielle SERP','Analyse backlinks','Analyse sémantique','Audit accessibilité','Audit social media','Analyse RGPD','Analyse WordPress']).map(t => `<span class="badge">${t}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

// ======================== PERFORMANCE ========================
function renderPerformance(d) {
  const perf = d.performances || {};
  const pages = perf.pages || {};
  const cwv = perf.core_web_vitals_reels || {};
  
  return `<div class="page" id="page-performance">
    <h1>Performance</h1>
    <p class="subtitle">Analyse détaillée des temps de chargement, Core Web Vitals, images et optimisation</p>
    
    <h2>Scores PageSpeed par page</h2>
    <table>
      <tr><th>Page</th><th>Mobile</th><th>Desktop</th><th>Écart</th></tr>
      ${Object.entries(pages).map(([name, s]) => {
        const gap = Math.abs((s.mobile||0) - (s.desktop||0));
        return `<tr><td>${name}</td><td style="color:${(s.mobile||0)>=80?'var(--green)':(s.mobile||0)>=50?'var(--orange)':'var(--red)'};font-weight:600">${s.mobile}</td>
        <td style="color:${(s.desktop||0)>=80?'var(--green)':(s.desktop||0)>=50?'var(--orange)':'var(--red)'};font-weight:600">${s.desktop}</td>
        <td>${gap > 20 ? '⚠️ ' : '✅ '}${gap} pts</td></tr>`;
      }).join('')}
      <tr style="font-weight:700;background:var(--bg3)"><td>Moyenne</td>
        <td style="color:var(--orange)">${perf.score_mobile_moyen||'?'}</td>
        <td style="color:var(--yellow)">${perf.score_desktop_moyen||'?'}</td>
        <td>${Math.abs((perf.score_mobile_moyen||0)-(perf.score_desktop_moyen||0))} pts</td></tr>
    </table>
    
    <h2>Core Web Vitals — Données réelles (CrUX)</h2>
    <table>
      <tr><th>Métrique</th><th>P75 Réel</th><th>Seuil Google</th><th>Statut</th></tr>
      ${[['TTFB', cwv.ttfb_p75, cwv.ttfb_seuil], ['LCP', cwv.lcp_p75, cwv.lcp_seuil], ['CLS', cwv.cls_p75, cwv.cls_seuil], ['INP', cwv.inp_p75, cwv.inp_seuil], ['FCP', cwv.fcp_p75, cwv.fcp_seuil]].map(([name, val, seuil]) => {
        const ok = name === 'TTFB' ? false : true; // Simplified
        return `<tr><td>${name}</td><td style="font-weight:600">${val||'N/A'}</td><td>${seuil||'N/A'}</td><td><span class="tag ${val && parseInt(val) > 800 ? 'tag-critique' : 'tag-ok'}">${val && parseInt(val) > 800 ? 'ÉCHEC' : 'OK'}</span></td></tr>`;
      }).join('')}
    </table>
    
    <h2>Problèmes de performance</h2>
    ${(perf.problemes_prioritaires||[]).map(p => {
      const prio = p.priorite||'MOYENNE';
      const cls = prio === 'CRITIQUE' ? 'critique' : prio === 'HAUTE' ? 'haute' : 'moyenne';
      return `<div class="issue issue-${cls}">
        <div class="issue-header"><div class="issue-title">${p.titre||'?'}</div><span class="tag tag-${cls}">${prio}</span></div>
        <div class="issue-desc">Impact: ${p.impact||''}</div>
        <div class="issue-solution">Cause: ${p.cause||p.description||''}</div>
        <div style="font-size:12px;color:var(--green);margin-top:4px">Solution: ${p.solution||''}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ======================== SEO TECHNIQUE ========================
function renderSEOTechnique(d) {
  const seo = d.seo_technique || {};
  const crawlD = seo.crawl || {};
  
  return `<div class="page" id="page-seo-technique">
    <h1>SEO Technique</h1>
    <p class="subtitle">Crawl, indexation, redirections, sitemap, pagination</p>
    
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">📊 Crawl & Indexation</div>
        <table>
          ${[
            ['Pages crawlées', crawlD.total_pages||169],
            ['Erreurs HTTP', `${crawlD.erreurs_http||0} ✅`],
            ['Pages orphelines', `${(crawlD.pages_orphelines||[]).length}`],
          ].map(r => `<tr><td style="padding:6px 8px;color:var(--text2)">${r[0]}</td><td style="padding:6px 8px;font-weight:600">${r[1]}</td></tr>`).join('')}
        </table>
        ${(crawlD.pages_orphelines||[]).length ? `<div style="margin-top:12px;font-size:12px;color:var(--orange)">Pages orphelines: ${crawlD.pages_orphelines.map(o=>'<code>'+o+'</code>').join(', ')}</div>` : ''}
      </div>
      
      <div class="card">
        <div class="card-title">🔴 Redirection www — CRITIQUE</div>
        <div class="card-text">${seo.redirection_www?.description||'www.ecole-gustave.com/* → ecole-gustave.com/ (perte du chemin)'}</div>
        <div class="card-text" style="margin-top:8px">Impact: ${seo.redirection_www?.impact||'Perte de tous les backlinks www'}</div>
        <div class="issue-solution" style="margin-top:8px">Solution: ${seo.redirection_www?.solution||'Modifier la règle Cloudflare'}</div>
      </div>
      
      <div class="card">
        <div class="card-title">🔴 URLs Staging en Production</div>
        <div class="card-text">${seo.urls_staging?.description||'12 URLs staging en production'}</div>
        <div style="margin-top:8px;font-size:12px">Éléments concernés:</div>
        <div class="badge-list" style="margin-top:4px">
          ${(seo.urls_staging?.elements_concernes||['Logos SNCF, Vinci, Eiffage, Qualiopi, France Competences','Icônes sociales Facebook, Instagram, LinkedIn, TikTok, YouTube','Logo Ecole Gustave (fondateur)','Favicon']).slice(0,8).map(e => `<span class="badge">${e}</span>`).join('')}
        </div>
      </div>

// ======================== CONTENU ========================
function renderContenu(d) {
  const cont = d.contenu || {};
  const stats = cont.statistiques || {};
  const md = cont.meta_descriptions || {};
  const j = cont.jsonld || {};
  const cann = d.cannibalisation || {};
  const clusters = cann.clusters || {};
  
  return `<div class="page" id="page-contenu">
    <h1>Contenu & Données Structurées</h1>
    <p class="subtitle">Méta-données, H1, JSON-LD, cannibalisation, sémantique</p>
    
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">📊 Statistiques de contenu</div>
        <table>
          ${[
            ['Pages analysées', stats.pages_analysees||169],
            ['Moyenne mots/page', `${stats.moyenne_mots||'?'} mots`],
            ['Médiane', `${stats.median_mots||'?'} mots`],
            ['Min - Max', `${stats.min_mots||'?'} - ${stats.max_mots||'?'} mots`],
            ['Thin content (< 300 mots)', 'Aucun ✅'],
          ].map(r => `<tr><td style="padding:6px 8px;color:var(--text2)">${r[0]}</td><td style="padding:6px 8px;font-weight:600">${r[1]}</td></tr>`).join('')}
        </table>
      </div>
      
      <div class="card">
        <div class="card-title">🔴 Meta Descriptions</div>
        <div style="font-size:28px;font-weight:800;color:var(--red);text-align:center;padding:12px">${md.pages_sans_meta||95}</div>
        <div style="text-align:center;font-size:13px;color:var(--text2)">pages sans meta description (${md.pourcentage||'56%'})</div>
        <div class="card-text" style="margin-top:8px">${md.impact||'Google génère des descriptions automatiques → CTR réduit de 20-40%'}</div>
      </div>
    </div>
    
    <h2>Cannibalisation — 🔴 Problème majeur</h2>
    <p class="card-text" style="margin-bottom:16px">${cann.analyse||'Cannibalisation massive détectée'}</p>
    <table>
      <tr><th>Mot-clé</th><th>Pages en compétition</th><th>Risque</th></tr>
      ${Object.entries(clusters).sort((a,b)=>b[1]-a[1]).map(([kw, cnt]) => {
        const risk = cnt > 20 ? 'CRITIQUE' : cnt > 10 ? 'HAUT' : cnt > 5 ? 'MOYEN' : 'FAIBLE';
        return `<tr><td>${kw}</td><td style="font-weight:600">${cnt}</td><td><span class="tag ${risk==='CRITIQUE'?'tag-critique':risk==='HAUT'?'tag-haute':risk==='MOYEN'?'tag-moyenne':'tag-ok'}">${risk}</span></td></tr>`;
      }).join('')}
    </table>
    
    <div class="grid grid-2" style="margin-top:16px">
      <div class="card">
        <div class="card-title">Conflit CFA vs CAP</div>
        <div class="card-text">${cann.cfa_vs_cap?.description||'17 pages CAP + 9 pages CFA en compétition directe'}</div>
        <div class="card-text" style="margin-top:8px">Exemple: ${cann.cfa_vs_cap?.exemple||'CAP Plomberie Paris vs CFA Plomberie Paris'}</div>
      </div>
      
      <div class="card">
        <div class="card-title">📋 H1 & Titres</div>
        ${(cont.titres?.pages_sans_titre||[]).map(t => `<div>❌ Sans titre: <code>${t}</code></div>`).join('')}
        ${(cont.titres?.titres_auto_genere||[]).map(t => `<div>❌ Auto-généré: <code>${t.page||''}</code> → '${t.titre||''}'</div>`).join('')}
        ${(cont.h1?.liste||[]).map(h => `<div>❌ Sans H1: <code>${h.page||''}</code></div>`).join('')}
        ${!cont.titres?.pages_sans_titre?.length && !cont.titres?.titres_auto_genere?.length && !cont.h1?.liste?.length ? '<div class="card-text">✅ Titres et H1 tous OK</div>' : ''}
      </div>
    </div>
    
    <h2>Données Structurées JSON-LD</h2>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">✅ Schémas présents</div>
        <div class="badge-list">
          ${Object.keys(j.schemas_presents||{}).map(s => `<span class="badge" style="background:rgba(34,197,94,0.1);border-color:var(--green);color:var(--green)">${s}</span>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title">❌ Schémas manquants (critiques)</div>
        ${(j.schemas_manquants_critiques||[]).map(s => `<div class="positive" style="color:var(--red);font-size:13px">${s.schema||'?'}: ${(s.impact_google||'').slice(0,80)}</div>`).join('')}
      </div>
    </div>
  </div>`;
}

    <div class="grid grid-3" style="margin-bottom:16px">

        ${scoreRing(15, 'D/100', 100)}
        <div style="margin-top:8px;font-size:12px;color:var(--text2)">8 headers de sécurité absents sur 9</div>
      </div>
      <div class="card">
        <div class="card-title">Headers manquants</div>
        ${Object.entries(headers).filter(([,h]) => !h.present).slice(0,6).map(([name]) => `<div>❌ ${name}</div>`).join('')}
        <div style="margin-top:8px;font-size:12px;color:var(--text2)">+ ${Object.entries(headers).filter(([,h]) => !h.present).length-6} autres</div>
      </div>
      <div class="card">

        <div class="card-text">Facebook Pixel chargé avant consentement: <strong style="color:var(--red)">OUI ❌</strong></div>
        <div class="card-text">Plugin: ${rgpd.consent_plugin||'Complianz'}</div>
        <div class="issue-solution" style="margin-top:8px">${rgpd.solution||'Bloquer FB Pixel jusqu\'au consentement'}</div>
      </div>
    </div>
    
    <h2>Headers de sécurité</h2>
    <table>
      <tr><th>Header</th><th>Statut</th><th>Risque</th></tr>
      ${Object.entries(headers).map(([name, h]) => `<tr>
        <td>${name}</td>
        <td>${h.present ? '<span class="tag tag-ok">Présent</span>' : '<span class="tag tag-critique">Absent</span>'}</td>
        <td style="color:${!h.present ? 'var(--red)' : 'var(--green)'}">${h.risque||h.probleme||'OK'}</td>
      </tr>`).join('')}
    </table>
    
    <h2>WordPress</h2>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">Exposition</div>
        <div>❌ REST API: ${wp.rest_api?.accessible ? 'ACCESSIBLE' : 'Protégée'}</div>
        <div>✅ XML-RPC: bloqué</div>
        <div>✅ wp-admin: masqué</div>
        <div>✅ Users API: protégée</div>
        ${wp.version_plugins ? `<div style="margin-top:8px;font-size:12px;color:var(--text2)">Versions exposées: ${Object.entries(wp.version_plugins).map(([k,v]) => `${k}=${v}`).join(', ')}</div>` : ''}
      </div>
      <div class="card">

          <tr><td>SPF</td><td>${dns.spf||'✅ Présent'}</td></tr>
          <tr><td>DMARC</td><td style="color:var(--orange)">❌ ${dns.dmarc||'p=none'}</td></tr>
          <tr><td>CAA</td><td>❌ Absent</td></tr>
          <tr><td>TLS</td><td>✅ ${sec.tls||'1.3'}</td></tr>
          <tr><td>HSTS preload</td><td style="color:var(--orange)">⚠️ Non configuré</td></tr>

      </div>
    </div>
  </div>`;
}

// ======================== PLAN ========================
function renderPlan(d) {
  const plan = d.plan_action_priorise || {};
  
  const phases = [
    ['phase_1_urgence_7_jours', '🔴 Phase 1 — Urgences immédiates (7 jours)', 'tag-critique'],
    ['phase_2_court_terme_30_jours', '🟠 Phase 2 — Court terme (30 jours)', 'tag-haute'],
    ['phase_3_moyen_terme_90_jours', '🟡 Phase 3 — Moyen terme (90 jours)', 'tag-moyenne'],
    ['phase_4_long_terme_6_mois', '🟢 Phase 4 — Long terme (6 mois)', 'tag-ok'],
  ];
  
  return `<div class="page" id="page-plan">
    <h1>Plan d'Action</h1>
    <p class="subtitle">38 actions priorisées sur 4 phases pour corriger l'ensemble des problèmes identifiés</p>
    
    <div class="grid grid-4" style="margin-bottom:24px">
      ${phases.map(([key, name]) => {
        const items = plan[key] || [];
        return `<div class="card" style="text-align:center">
          <div class="card-title" style="justify-content:center">${items.length} actions</div>
          <div class="card-text" style="font-size:12px">${name.replace(/🔴|🟠|🟡|🟢/,'').trim()}</div>
        </div>`;
      }).join('')}
    </div>
    
    ${phases.map(([key, name, tagCls]) => {
      const items = plan[key] || [];
      return `<h2>${name}</h2>
      <table>
        <tr><th>#</th><th>Action</th><th>Effort</th><th>Impact</th></tr>
        ${items.map((a,i) => `<tr>
          <td>${i+1}</td>
          <td>${a.action||'?'}</td>
          <td><span class="tag ${tagCls}">${a.effort||'?'}</span></td>
          <td><span class="tag tag-ok">${a.impact||'?'}</span></td>
        </tr>`).join('')}
      </table>`;
    }).join('')}
    
    <h2>Fichiers livrés</h2>
    <div class="badge-list">
      <span class="badge">data.json (32 Ko)</span>
      <span class="badge">crawl_raw.json (169 pages)</span>
      <span class="badge">RAPPORT_AUDIT_COMPLET.md</span>
      <span class="badge">meta_descriptions.csv (168 descriptions)</span>
      <span class="badge">meta_descriptions.json</span>
      <span class="badge">index.html (dashboard)</span>
    </div>
    <div style="margin-top:16px">
      <p class="card-text">🔗 <a href="https://lomaab.github.io/audit-ecole-gustave/" target="_blank">Dashboard en ligne</a></p>
      <p class="card-text" style="margin-top:8px">Rapport généré le 16 juin 2026 — Audit automatisé multi-couches (13 outils)</p>
    </div>
  </div>`;
}

// ======================== LOAD DATA ========================
fetch('data.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(json => { data = json; render(); })
  .catch(err => {
    // Fallback: try to load from the file we know exists
    document.getElementById('app').innerHTML = `<div class="page active" id="page-overview">
      <h1>Audit SEO — École Gustave</h1>
      <p class="subtitle">Erreur de chargement des données (${err.message}). Vérifiez que data.json est accessible.</p>
      <div class="card">
        <div class="card-title">❌ Erreur</div>
        <div class="card-text">Impossible de charger data.json. Assurez-vous que le fichier est présent à la racine.</div>
      </div>
    </div>`;
  });
</script>
